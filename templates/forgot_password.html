{% extends "base.html" %}
{% block content %}
<div class="min-h-[75vh] flex items-center justify-center px-4 bg-[#F4F5F7]">
    <div class="max-w-md w-full bg-white border border-[#E2E8F0] p-8 rounded-3xl shadow-sm space-y-6">
        <div class="text-center space-y-2">
            <h2 class="text-xl font-bold text-[#0F172A]">Reset Password</h2>
            <p class="text-xs text-[#64748B]">Follow the steps to reset your password.</p>
        </div>

        <!-- Step 1: Find User -->
        {% if step == 1 %}
        <form action="/forgot-password" method="POST" class="space-y-4">
            <input type="hidden" name="action" value="find_user">
            <div>
                <label class="block text-xs font-semibold text-[#64748B] mb-1">Enter Username</label>
                <input type="text" name="username" required placeholder="username" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-xl p-2.5 text-sm outline-none focus:border-blue-500 transition-colors">
            </div>
            <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm">Continue</button>
        </form>

        <!-- Step 2: Answer Security Question -->
        {% elif step == 2 %}
        <form action="/forgot-password" method="POST" class="space-y-4">
            <input type="hidden" name="action" value="verify_answer">
            <input type="hidden" name="username" value="{{ user.username }}">
            <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 space-y-1">
                <p class="text-[10px] uppercase font-bold text-slate-500 tracking-wider">Security Question</p>
                <p class="text-sm font-semibold text-slate-800">{{ user.security_question }}</p>
            </div>
            <div>
                <label class="block text-xs font-semibold text-[#64748B] mb-1">Your Answer</label>
                <input type="text" name="security_answer" required placeholder="Answer" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-xl p-2.5 text-sm outline-none focus:border-blue-500 transition-colors">
            </div>
            <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm">Verify Answer</button>
        </form>

        <!-- Step 3: Set New Password -->
        {% elif step == 3 %}
        <form action="/forgot-password" method="POST" class="space-y-4">
            <input type="hidden" name="action" value="reset_password">
            <input type="hidden" name="username" value="{{ user.username }}">
            <div>
                <label class="block text-xs font-semibold text-[#64748B] mb-1">New Password</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-xl p-2.5 text-sm outline-none focus:border-blue-500 transition-colors">
            </div>
            <button type="submit" class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm">Reset Password</button>
        </form>
        {% endif %}

        <div class="text-center text-xs">
            <a href="/login" class="text-blue-600 hover:underline">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
