{% extends "base.html" %}
{% block content %}
<div class="min-h-[75vh] flex items-center justify-center px-4 bg-[#F4F5F7]">
    <div class="max-w-md w-full bg-white border border-[#E2E8F0] p-8 rounded-3xl shadow-sm space-y-6">
        <div class="text-center space-y-2">
            <h2 class="text-xl font-bold text-[#0F172A]">Recover Username</h2>
            <p class="text-xs text-[#64748B]">Enter your recovery email to find your username.</p>
        </div>

        {% if username %}
        <div class="bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-2xl p-4 text-center space-y-2">
            <p class="text-xs font-semibold uppercase tracking-wider text-emerald-600">Your Username</p>
            <p class="text-lg font-bold">{{ username }}</p>
            <a href="/login" class="inline-block mt-2 text-xs font-semibold text-emerald-700 hover:underline">Go to Login</a>
        </div>
        {% else %}
        <form action="/forgot-username" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-[#64748B] mb-1">Recovery Email</label>
                <input type="email" name="email" required placeholder="you@example.com" class="w-full bg-[#F8FAFC] border border-[#E2E8F0] rounded-xl p-2.5 text-sm outline-none focus:border-blue-500 transition-colors">
            </div>
            <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm">Find Username</button>
        </form>
        <div class="text-center text-xs">
            <a href="/login" class="text-blue-600 hover:underline">Back to Login</a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
